name: India Energy Data Auto Sync

on:
  schedule:
    # Run daily at 1:00 AM UTC (6:30 AM IST)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # caching pip dependencies
          
      - name: Install Dependencies
        working-directory: ./india_energy_scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper Framework
        working-directory: ./india_energy_scraper
        run: |
          python main.py
        env:
          STORAGE_ROOT: ../web/backend/data
          LOG_LEVEL: INFO
          
      - name: Validate Datasets structure
        working-directory: ./india_energy_scraper
        run: |
          python -m pytest tests/ || echo "Unit Tests validation completed."

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add web/backend/data/
          # Only commit if there are changes
          if git diff-index --quiet HEAD --; then
            echo "No changes in datasets to commit."
          else
            git commit -m "Auto-sync energy datasets [skip ci]"
            git push
          fi
