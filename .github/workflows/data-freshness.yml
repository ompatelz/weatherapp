name: Energy Data Auto-Refresh Pipeline

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GH UI

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      working-directory: ./india_energy_scraper
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pdfplumber pandas # Ensure heavy-duty extractors are available

    - name: Run Extraction Pipeline
      working-directory: ./india_energy_scraper
      run: |
        python main.py
        
    - name: Commit and Push specific JSON artifacts
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add ./india_energy_scraper/output/
        git commit -m "chore(data): auto-update daily energy capacities & insights [skip ci]" || echo "No changes to commit"
        git push
